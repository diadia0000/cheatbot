networks:
  cheet_net:
    driver: bridge

services:
  vllm_server:
    image: vllm/vllm-openai:latest-cu130
    container_name: vllm_server
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64:/usr/local/cuda/lib64
    command: >
      --model /models/Qwen2.5-14B-Instruct-AWQ --quantization awq --max-model-len 32768 --gpu-memory-utilization 0.9
    shm_size: '16gb'
    networks:
      - cheet_net

  fastapi_backend:
    build:
      context: ./backend
    container_name: fastapi_backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - VLLM_API_URL=http://vllm_server:8000/v1
      - MODEL_NAME=/models/Qwen2.5-14B-Instruct-AWQ
      - FAL_KEY=${FAL_KEY}
    depends_on:
      - vllm_server
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cheet_net

  streamlit_frontend:
    build:
      context: ./frontend
    container_name: streamlit_frontend
    ports:
      - "0.0.0.0:8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_API_URL=http://fastapi_backend:8080
    depends_on:
      fastapi_backend:
        condition: service_healthy
    restart: on-failure
    networks:
      - cheet_net
