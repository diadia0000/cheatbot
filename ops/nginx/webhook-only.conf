server {
    listen 80;
    server_name _;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Canonical LINE webhook path.
    location ~ ^/line/webhook/?$ {
        proxy_pass http://fastapi_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Backward compatibility: accept /webhook and forward it to /line/webhook.
    location ~ ^/webhook/?$ {
        rewrite ^ /line/webhook break;
        proxy_pass http://fastapi_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Root POST – some LINE webhook URLs omit the path.
    location = / {
        rewrite ^ /line/webhook break;
        proxy_pass http://fastapi_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
